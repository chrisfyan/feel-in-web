<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feel-In — Conectá desde lo que sentís</title>
    <meta name="description" content="Feel-In es la app donde las conexiones nacen de lo que pensás y sentís. Respondé preguntas profundas, descubrí quién vibra como vos.">
    <meta name="theme-color" content="#0D0B1A">

    <!-- Open Graph -->
    <meta property="og:title" content="Feel-In — Conectá desde lo que sentís">
    <meta property="og:description" content="Conexiones reales nacen de respuestas reales. Descargá Feel-In.">
    <meta property="og:image" content="https://feel-in.app/og-image.png">
    <meta property="og:url" content="https://feel-in.app">
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Feel-In — Conectá desde lo que sentís">
    <meta name="twitter:description" content="Conexiones reales nacen de respuestas reales.">
    <meta name="twitter:image" content="https://feel-in.app/og-image.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0D0B1A;
            color: #F0EDF6;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(107, 91, 149, 0.15) 0%, rgba(196, 169, 98, 0.05) 40%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle star particles */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #F0EDF6;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: var(--max-opacity); }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            text-align: center;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 260px;
            max-width: 65vw;
            margin-bottom: 1.8rem;
            filter: drop-shadow(0 0 40px rgba(107, 91, 149, 0.3));
        }

        .tagline {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 400;
            color: #B8A9D4;
            letter-spacing: 0.02em;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        .stores {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .store-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            background: rgba(107, 91, 149, 0.15);
            border: 1px solid rgba(107, 91, 149, 0.3);
            color: #F0EDF6;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .store-btn:hover {
            background: rgba(107, 91, 149, 0.3);
            border-color: rgba(184, 169, 212, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(107, 91, 149, 0.2);
        }

        .store-btn svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        .redirect-msg {
            font-size: 0.8rem;
            color: rgba(184, 169, 212, 0.5);
            margin-top: 0.5rem;
            font-weight: 300;
        }

        .footer {
            position: fixed;
            bottom: 1.5rem;
            z-index: 1;
            font-size: 0.75rem;
            color: rgba(184, 169, 212, 0.3);
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .footer a {
            color: rgba(184, 169, 212, 0.4);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: #B8A9D4;
        }

        /* Loading state before redirect */
        .loading-dot {
            display: inline-block;
            animation: pulse 1.4s ease-in-out infinite;
        }

        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Decorative stars -->
    <div class="stars" id="stars"></div>

    <div class="container">
        <img src="logotipo.png" alt="Feel-In" class="logo">

        <p class="tagline">Conectá desde lo que sentís</p>

        <div class="stores">
            <!-- TODO: Replace # with actual store URLs when published -->
            <a href="#" class="store-btn" id="btn-ios" aria-label="Descargar en App Store">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                </svg>
                App Store
            </a>

            <a href="#" class="store-btn" id="btn-android" aria-label="Descargar en Google Play">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3.18 23.67c-.35-.2-.55-.58-.55-1.06V1.39c0-.48.2-.86.55-1.06l11.07 11.67L3.18 23.67zm14.83-8.43L5.42 22.5l10.14-10.7 2.45 3.44zm1.31-1.38L16.77 12l2.55-1.86 2.55 1.41c.67.37.67.97 0 1.34l-2.55 1.37zM5.42 1.5l12.59 7.26-2.45 2.58L5.42 1.5z"/>
                </svg>
                Google Play
            </a>
        </div>

        <p class="redirect-msg" id="redirect-msg"></p>
    </div>

    <div class="footer">
        <a href="mailto:info@feel-in.app">info@feel-in.app</a>
    </div>

    <script>
        // Generate subtle star particles
        (function() {
            const container = document.getElementById('stars');
            const count = 40;
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (3 + Math.random() * 4) + 's');
                star.style.setProperty('--max-opacity', (0.2 + Math.random() * 0.5).toString());
                star.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(star);
            }
        })();

        // Smart redirect based on platform
        (function() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const msgEl = document.getElementById('redirect-msg');

            // TODO: Replace these with actual store URLs
            const IOS_URL = '#'; // e.g., 'https://apps.apple.com/app/feel-in/idXXXXXXXXX'
            const ANDROID_URL = '#'; // e.g., 'https://play.google.com/store/apps/details?id=com.feelin.app'

            // Don't auto-redirect while store URLs are placeholders
            if (IOS_URL === '#' && ANDROID_URL === '#') return;

            if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
                msgEl.innerHTML = 'Redirigiendo a App Store<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>';
                setTimeout(function() { window.location.href = IOS_URL; }, 1500);
            } else if (/android/i.test(ua)) {
                msgEl.innerHTML = 'Redirigiendo a Google Play<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>';
                setTimeout(function() { window.location.href = ANDROID_URL; }, 1500);
            }
        })();
    </script>
</body>
</html>
