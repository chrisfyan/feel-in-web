<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feel-In — Conectá desde lo que sentís</title>
    <meta name="description" content="Feel-In es la app donde las conexiones nacen de lo que pensás y sentís. Respondé preguntas profundas, descubrí quién vibra como vos.">
    <meta name="theme-color" content="#0D0B1A">

    <!-- Open Graph -->
    <meta property="og:title" content="Feel-In — Conectá desde lo que sentís">
    <meta property="og:description" content="Conexiones reales nacen de respuestas reales. Descargá Feel-In.">
    <meta property="og:image" content="https://feel-in.app/og-image.png">
    <meta property="og:url" content="https://feel-in.app">
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Feel-In — Conectá desde lo que sentís">
    <meta name="twitter:description" content="Conexiones reales nacen de respuestas reales.">
    <meta name="twitter:image" content="https://feel-in.app/og-image.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0D0B1A;
            color: #F0EDF6;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ── Full background image ── */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg.png') center center / cover no-repeat;
            z-index: 0;
        }

        /* Top gradient for description readability */
        .bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(to bottom, rgba(13, 11, 26, 0.8) 0%, rgba(13, 11, 26, 0.3) 60%, transparent 100%);
            z-index: 1;
        }

        /* Bottom gradient for buttons/email readability */
        .bg::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(13, 11, 26, 0.9) 0%, rgba(13, 11, 26, 0.4) 50%, transparent 100%);
            z-index: 1;
        }

        /* ── Top content (description) ── */
        .top {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 4.5rem 2rem 0;
            animation: fadeDown 1s ease-out;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .description {
            font-size: 1.05rem;
            font-weight: 400;
            line-height: 1.65;
            color: #B8A9D4;
            text-align: center;
            max-width: 520px;
            letter-spacing: 0.2px;
            text-shadow: 0 2px 20px rgba(13, 11, 26, 0.8);
        }

        /* ── Bottom content (buttons + email) ── */
        .bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 2rem 2.5rem;
            animation: fadeUp 1s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Store buttons ── */
        .stores {
            display: flex;
            gap: 0.7rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 1.8rem;
        }

        .store-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1.5rem;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #F0EDF6;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .store-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(184, 169, 212, 0.35);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(107, 91, 149, 0.15);
        }

        .store-btn:active {
            transform: translateY(0);
        }

        .store-btn svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            opacity: 0.85;
        }

        /* ── Redirect message ── */
        .redirect-msg {
            font-size: 0.75rem;
            color: rgba(184, 169, 212, 0.4);
            font-weight: 300;
            min-height: 1.2em;
            margin-bottom: 0.8rem;
        }

        /* ── Email ── */
        .email {
            font-size: 0.82rem;
            font-weight: 400;
            letter-spacing: 0.4px;
        }

        .email a {
            color: #B8A9D4;
            text-decoration: none;
            transition: color 0.3s;
        }

        .email a:hover {
            color: #F0EDF6;
        }

        /* ── Language toggle ── */
        .lang-toggle {
            position: fixed;
            top: 1.2rem;
            right: 1.2rem;
            z-index: 3;
            display: flex;
            gap: 0;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            animation: fadeDown 1s ease-out;
        }

        .lang-btn {
            padding: 0.35rem 0.65rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: #6B6380;
        }

        .lang-btn.active {
            background: rgba(255, 255, 255, 0.1);
            color: #F0EDF6;
        }

        .lang-btn:hover:not(.active) {
            color: #9B93B0;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .top {
                padding: 4rem 1.5rem 0;
            }
            .description {
                font-size: 0.92rem;
            }
            .bottom {
                padding: 0 1.5rem 2rem;
            }
        }

        @media (max-aspect-ratio: 3/4) {
            .bg {
                background-position: center 35%;
            }
            .top {
                padding-top: 3.5rem;
            }
        }

        /* Very tall screens (mobile portrait) */
        @media (max-height: 700px) {
            .top {
                padding-top: 3rem;
            }
            .description {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg"></div>

    <!-- Language toggle -->
    <div class="lang-toggle">
        <button class="lang-btn active" id="lang-es" onclick="setLang('es')">ES</button>
        <button class="lang-btn" id="lang-en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" id="lang-pt" onclick="setLang('pt')">PT</button>
    </div>

    <!-- Description at the top -->
    <div class="top">
        <p class="description" id="description"></p>
    </div>

    <!-- Buttons + email at the bottom -->
    <div class="bottom">
        <div class="stores">
            <a href="#" class="store-btn" id="btn-ios" aria-label="Descargar en App Store">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                </svg>
                App Store
            </a>

            <a href="#" class="store-btn" id="btn-android" aria-label="Descargar en Google Play">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3.18 23.67c-.35-.2-.55-.58-.55-1.06V1.39c0-.48.2-.86.55-1.06l11.07 11.67L3.18 23.67zm14.83-8.43L5.42 22.5l10.14-10.7 2.45 3.44zm1.31-1.38L16.77 12l2.55-1.86 2.55 1.41c.67.37.67.97 0 1.34l-2.55 1.37zM5.42 1.5l12.59 7.26-2.45 2.58L5.42 1.5z"/>
                </svg>
                Google Play
            </a>
        </div>

        <p class="redirect-msg" id="redirect-msg"></p>

        <div class="email">
            <a href="mailto:info@feel-in.app">info@feel-in.app</a>
        </div>
    </div>

    <script>
        var i18n = {
            es: {
                title: 'Feel-In — Conectá desde lo que sentís',
                metaDesc: 'Feel-In es la app donde las conexiones nacen de lo que pensás y sentís. Respondé preguntas profundas, descubrí quién vibra como vos.',
                description: 'La app donde las conexiones nacen de lo que pensás y sentís. Respondé preguntas profundas, descubrí quién vibra como vos.',
                iosLabel: 'Descargar en App Store',
                androidLabel: 'Descargar en Google Play',
                redirectIos: 'Redirigiendo a App Store...',
                redirectAndroid: 'Redirigiendo a Google Play...'
            },
            en: {
                title: 'Feel-In — Connect from what you feel',
                metaDesc: 'Feel-In is the app where connections are born from what you think and feel. Answer deep questions, discover who vibes like you.',
                description: 'The app where connections are born from what you think and feel. Answer deep questions, discover who vibes like you.',
                iosLabel: 'Download on App Store',
                androidLabel: 'Get it on Google Play',
                redirectIos: 'Redirecting to App Store...',
                redirectAndroid: 'Redirecting to Google Play...'
            },
            pt: {
                title: 'Feel-In — Conecte-se a partir do que você sente',
                metaDesc: 'Feel-In é o app onde as conexões nascem do que você pensa e sente. Responda perguntas profundas, descubra quem vibra como você.',
                description: 'O app onde as conexões nascem do que você pensa e sente. Responda perguntas profundas, descubra quem vibra como você.',
                iosLabel: 'Baixar na App Store',
                androidLabel: 'Disponível no Google Play',
                redirectIos: 'Redirecionando para a App Store...',
                redirectAndroid: 'Redirecionando para o Google Play...'
            }
        };

        var currentLang = 'es';

        function setLang(lang) {
            currentLang = lang;
            var t = i18n[lang];

            document.title = t.title;
            document.querySelector('meta[name="description"]').setAttribute('content', t.metaDesc);
            document.getElementById('description').textContent = t.description;
            document.getElementById('btn-ios').setAttribute('aria-label', t.iosLabel);
            document.getElementById('btn-android').setAttribute('aria-label', t.androidLabel);
            document.documentElement.lang = lang;

            document.getElementById('lang-es').className = 'lang-btn' + (lang === 'es' ? ' active' : '');
            document.getElementById('lang-en').className = 'lang-btn' + (lang === 'en' ? ' active' : '');
            document.getElementById('lang-pt').className = 'lang-btn' + (lang === 'pt' ? ' active' : '');
        }

        // Auto-detect language
        (function() {
            var browserLang = (navigator.language || navigator.userLanguage || 'es').toLowerCase();
            var lang;
            if (browserLang.startsWith('pt')) {
                lang = 'pt';
            } else if (browserLang.startsWith('es')) {
                lang = 'es';
            } else {
                lang = 'en';
            }
            setLang(lang);
        })();

        // Smart redirect
        (function() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var msg = document.getElementById('redirect-msg');
            var IOS_URL = '#';
            var ANDROID_URL = '#';

            if (IOS_URL === '#' && ANDROID_URL === '#') return;

            var t = i18n[currentLang];
            if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
                msg.textContent = t.redirectIos;
                setTimeout(function() { window.location.href = IOS_URL; }, 1500);
            } else if (/android/i.test(ua)) {
                msg.textContent = t.redirectAndroid;
                setTimeout(function() { window.location.href = ANDROID_URL; }, 1500);
            }
        })();
    </script>
</body>
</html>
