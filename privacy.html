            position: relative;

        /* ── Language toggle ── */
        .lang-toggle {
            position: fixed;
            top: 1.2rem;
            right: 1.2rem;
            z-index: 3;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            animation: fadeDown 1s ease-out;
        }

        .lang-btn {
            padding: 0.35rem 0.65rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: #6B6380;
        }

        .lang-btn.active {
            background: rgba(255, 255, 255, 0.1);
            color: #F0EDF6;
        }

        .lang-btn:hover:not(.active) {
            color: #9B93B0;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Main container ── */
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 4.5rem 2rem 3rem;

            color: #9B93B0;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 2rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #F0EDF6;
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }

        /* ── Title ── */
        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #F0EDF6;
            margin-bottom: 0.5rem;
        }

        .last-updated {
            font-size: 0.78rem;
            font-weight: 400;
            color: #6B6380;
            margin-bottom: 2rem;
        }

        .intro {
            font-size: 0.92rem;
            font-weight: 400;
            line-height: 1.7;
            color: #B8A9D4;
            margin-bottom: 2.5rem;
        }

        /* ── Sections ── */
        .section {
            background: linear-gradient(145deg, rgba(30, 26, 45, 0.5), rgba(22, 19, 32, 0.5));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #F0EDF6;
            margin-bottom: 1rem;
            letter-spacing: 0.3px;
        }

        .section p,
        .section li {
            font-size: 0.82rem;
            font-weight: 400;
            line-height: 1.7;
            color: #9B93B0;
        }

        .section p {
            margin-bottom: 0.6rem;
        }

        .section p:last-child {
            margin-bottom: 0;
        }

        .section ul {
            list-style: none;
            padding-left: 0;
            margin-bottom: 0.6rem;
        }

        .section li {
            position: relative;
            padding-left: 1rem;
            margin-bottom: 0.3rem;
        }

        .section li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.55em;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #6B5B95;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 2rem 0 1rem;
        }

        .footer a {
            color: #B8A9D4;
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 400;
            transition: color 0.3s;
        }

            color: #F0EDF6;
        }

        /* ── Responsive ── */

            .container {

            }
            .page-title {
                font-size: 1.3rem;
            }
            .section {
                padding: 1.2rem;
                border-radius: 16px;
            }
        }

        var currentLang = 'es';

        function setLang(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;

            document.getElementById('lang-es').className = 'lang-btn' + (lang === 'es' ? ' active' : '');
            document.getElementById('lang-en').className = 'lang-btn' + (lang === 'en' ? ' active' : '');
            document.getElementById('lang-pt').className = 'lang-btn' + (lang === 'pt' ? ' active' : '');

            var t = content[lang];
            document.getElementById('back-text').textContent = t.back;
            document.getElementById('page-title').textContent = t.title;
            document.getElementById('last-updated').textContent = t.updated;
            document.getElementById('intro').textContent = t.intro;

            var html = '';
            for (var i = 0; i < t.sections.length; i++) {
                var s = t.sections[i];
                html += '<div class="section"><h2 class="section-title">' + s.title + '</h2>';
                for (var j = 0; j < s.items.length; j++) {
                    var item = s.items[j];
                    if (typeof item === 'string') {
                        html += '<p>' + item + '</p>';
                    } else if (item.list) {
                        html += '<ul>';
                        for (var k = 0; k < item.list.length; k++) {
                            html += '<li>' + item.list[k] + '</li>';
                        }
                        html += '</ul>';
                    }
                }
                html += '</div>';
            }
            document.getElementById('sections').innerHTML = html;
        }

        // Auto-detect language
        (function() {
            var browserLang = (navigator.language || navigator.userLanguage || 'es').toLowerCase();
            var lang;
            if (browserLang.startsWith('pt')) {
                lang = 'pt';
            } else if (browserLang.startsWith('es')) {
                lang = 'es';
            } else {
                lang = 'en';
            }
            setLang(lang);
        })();
    </script>
